name: Build Template
on:
  workflow_call:
    inputs:
      node-version: { required: true, type: string }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Marketplace
      - uses: actions/setup-node@v4 # Marketplace
        with:
          node-version: ${{ inputs.node-version }}
      - run: |
          npm install
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: dist/